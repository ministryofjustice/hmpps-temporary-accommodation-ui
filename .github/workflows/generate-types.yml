name: Generate Types

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_ENV: test
  API_CLIENT_ID: approved-premises
  API_CLIENT_SECRET: clientsecret

jobs:
  generate-types:
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Repository is specified to run the workflow from the API repository
          repository: 'ministryofjustice/hmpps-temporary-accommodation-ui'
          persist-credentials: 'false'

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            hmpps-temporary-accommodation-ui

      - name: Generate Types
        run: ./script/generate-types ${{ vars.CAS3_API_SPEC_URL }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          title: 'API model updates'
          commit-message: 'Updating hmpps-approved-premises-api models from OpenAPI specification'
          body: 'Updating hmpps-approved-premises-api models from OpenAPI specification.  This PR was created automatically from the generate-types.yml Workflow'
          delete-branch: true
          branch: update-api-types
